<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <article class="profile-card">

       <img src="https://images.unsplash.com/photo-1519052537078-e6302a4968d4?w=150&h=150&fit=crop"
        alt="Cute Cat Avatar"
        class="avatar">

        <h2>Afrin Akter Jabin</h2>

        <p class="bio">
            Frontend Developer & UI Designer
        </p>

        <section class="stats">
            <ul>
                <li>
                    <strong>12K</strong>
                    <span>Followers</span>
                </li>

                <li>
                    <strong>450</strong>
                    <span>Following</span>
                </li>
            </ul>
        </section>

        <button type="button">Follow</button>

    </article>

</body>
</html>
